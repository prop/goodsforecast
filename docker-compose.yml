services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: goodsforecast
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d goodsforecast"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: app
      PGPASSWORD: app
      PGDATABASE: goodsforecast
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  pgdata:
